name: Native

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  make:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential time

      - name: Build
        run: make clean all

      - name: Test
        run: |
          bash ./tests/wfa.utest.sh
          bash ./tests/wfa.singletrack.utest.sh

  cmake:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, name: linux-gcc, cc: gcc, cxx: g++ }
          - { os: ubuntu-latest, name: linux-clang, cc: clang, cxx: clang++ }
          - { os: ubuntu-24.04-arm, name: linux-arm64, cc: gcc, cxx: g++ }
          - { os: macos-latest, name: macos-arm64, cc: clang, cxx: clang++ }

    steps:
      - uses: actions/checkout@v6

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends build-essential clang cmake pkg-config time

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install coreutils gnu-time pkg-config
          mkdir -p "$RUNNER_TEMP/ci-bin"
          ln -sf "$(brew --prefix coreutils)/bin/greadlink" "$RUNNER_TEMP/ci-bin/readlink"
          ln -sf "$(brew --prefix gnu-time)/bin/gtime" "$RUNNER_TEMP/ci-bin/time"
          echo "$RUNNER_TEMP/ci-bin" >> "$GITHUB_PATH"

      - name: Configure (${{ matrix.name }})
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_SHARED_LIB=ON

      - name: Build (${{ matrix.name }})
        run: cmake --build build --parallel

      - name: Test (${{ matrix.name }})
        run: ctest --test-dir build --output-on-failure
